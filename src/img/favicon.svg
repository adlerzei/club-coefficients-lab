<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#163f79"/>
  <!-- White ball -->
  <circle cx="16" cy="16" r="13" fill="white"/>
  <!-- Classic soccer ball seam lines (pentagon + 5 spokes) -->
  <g fill="#163f79" stroke="#163f79" stroke-linejoin="round">
    <!-- Centre pentagon -->
    <polygon points="16,11.5 20.3,14.6 18.7,19.6 13.3,19.6 11.7,14.6"/>
    <!-- 5 seam lines from pentagon vertices to ball edge -->
    <line stroke-width="1.3" stroke-linecap="round" x1="16"    y1="11.5" x2="16"    y2="3"/>
    <line stroke-width="1.3" stroke-linecap="round" x1="20.3"  y1="14.6" x2="27.4"  y2="12.3"/>
    <line stroke-width="1.3" stroke-linecap="round" x1="18.7"  y1="19.6" x2="23.1"  y2="25.7"/>
    <line stroke-width="1.3" stroke-linecap="round" x1="13.3"  y1="19.6" x2="8.9"   y2="25.7"/>
    <line stroke-width="1.3" stroke-linecap="round" x1="11.7"  y1="14.6" x2="4.6"   y2="12.3"/>
  </g>
  <!-- Ball outline -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#163f79" stroke-width="1.5"/>
</svg>
